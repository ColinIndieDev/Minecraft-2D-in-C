<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Flappy Bird Clone</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html, body {
            width: 100%;
            height: 100%;
            overflow: hidden;
            background: #000;
        }

        #canvas {
            display: block;
            width: 100vw;
            height: 100vh;
            outline: none;
        }

        #loading {
            position: fixed;
            inset: 0;
            background: #000;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 24px;
            z-index: 10;
            font-family: monospace;
            color: #fff;
            transition: opacity 0.4s ease;
        }

        #loading.hidden {
            opacity: 0;
            pointer-events: none;
        }

        #loading-bar-wrap {
            width: 200px;
            height: 2px;
            background: #222;
        }

        #loading-bar {
            height: 100%;
            width: 0%;
            background: #fff;
            transition: width 0.2s ease;
        }

        #loading-text {
            font-size: 11px;
            color: #555;
            letter-spacing: 0.1em;
        }
    </style>
</head>
<body>
    <div id="loading">
        <div id="loading-bar-wrap">
            <div id="loading-bar"></div>
        </div>
        <div id="loading-text">LOADING...</div>
    </div>

    <canvas id="canvas" oncontextmenu="event.preventDefault()"></canvas>

    <script>
        var Module = {
            canvas: document.getElementById('canvas'),

            setStatus: function(text) {
                var bar = document.getElementById('loading-bar');
                var label = document.getElementById('loading-text');
                var match = text.match(/(\d+(\.\d+)?)\/(\d+)/);
                if (match) {
                    var pct = (parseInt(match[1]) / parseInt(match[3])) * 100;
                    bar.style.width = pct + '%';
                    label.textContent = 'LOADING... ' + Math.round(pct) + '%';
                } else if (text === '') {
                    document.getElementById('loading').classList.add('hidden');
                } else {
                    label.textContent = text.toUpperCase();
                }
            },

            onRuntimeInitialized: function() {
                document.getElementById('loading').classList.add('hidden');

                // Resize canvas to window
                var canvas = document.getElementById('canvas');
                canvas.width = window.innerWidth;
                canvas.height = window.innerHeight;
            },

            print: function(text) { console.log(text); },
            printErr: function(text) { console.error(text); }
        };

        window.addEventListener('resize', function() {
            var canvas = document.getElementById('canvas');
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        });

        // Keep canvas focused for input
        window.addEventListener('click', function() {
            document.getElementById('canvas').focus();
        });
    </script>

    <script async type="text/javascript" src="Template.js"></script>
</body>
</html>
